<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎲 Party Game</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Menu Screen -->
  <div id="menu" class="screen active">
    <h1>🎲 Party Game</h1>
    <p class="subtitle">Обери гру та грай з друзями!</p>
    <div class="game-grid">
      <button class="game-btn truth-btn" onclick="startGame('truth')">
        <span class="game-icon">🎯</span>
        <span class="game-name">Правда</span>
      </button>
      <button class="game-btn dare-btn" onclick="startGame('dare')">
        <span class="game-icon">🔥</span>
        <span class="game-name">Дія</span>
      </button>
      <button class="game-btn never-btn" onclick="startGame('never')">
        <span class="game-icon">🍺</span>
        <span class="game-name">Я ніколи не...</span>
      </button>
      <button class="game-btn rather-btn" onclick="startGame('rather')">
        <span class="game-icon">⚖️</span>
        <span class="game-name">Що б ти обрав?</span>
      </button>
    </div>
    <button class="random-btn" onclick="startGame('random')">🎲 Випадкове питання</button>
    <div class="share-section">
      <button class="share-btn" onclick="shareBot()">📢 Запросити друзів</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game" class="screen">
    <div class="game-header">
      <button class="back-btn" onclick="showMenu()">← Назад</button>
      <span id="game-title" class="game-title-text"></span>
      <span id="counter" class="counter"></span>
    </div>
    <div id="question-card" class="question-card">
      <div id="question-text" class="question-text"></div>
      <div id="rather-options" class="rather-options hidden">
        <button class="option-btn option-a" onclick="vote('A')">🅰️ <span id="optA"></span></button>
        <button class="option-btn option-b" onclick="vote('B')">🅱️ <span id="optB"></span></button>
      </div>
      <div id="never-btns" class="never-btns hidden">
        <button class="react-btn drink" onclick="react('drink')">🍺 Я робив!</button>
        <button class="react-btn clean" onclick="react('clean')">😇 Не я!</button>
      </div>
    </div>
    <button id="next-btn" class="next-btn" onclick="nextQuestion()">➡️ Наступне</button>
    <button class="share-question-btn" onclick="shareQuestion()">📢 Поділитися питанням</button>
    <!-- Share nudge toast -->
    <div id="share-nudge" class="share-nudge">
      <span id="nudge-text">З друзями веселіше!</span>
      <button class="nudge-share-btn" onclick="shareBot()">📢</button>
      <button class="nudge-close-btn" onclick="dismissNudge()">✕</button>
    </div>
  </div>

  <!-- Session Summary Screen -->
  <div id="summary" class="screen">
    <div class="summary-card">
      <h2>🏆 Твоя сесія</h2>
      <div class="summary-stats">
        <div class="stat-item">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label">питань</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-truths">0</span>
          <span class="stat-label">🎯 правд</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-dares">0</span>
          <span class="stat-label">🔥 дій</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-nevers">0</span>
          <span class="stat-label">🍺 ніколи</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-rathers">0</span>
          <span class="stat-label">⚖️ виборів</span>
        </div>
      </div>
      <div class="summary-title" id="summary-title">🎉 Молодець!</div>
      <div class="summary-actions">
        <button class="share-result-btn" onclick="shareResults()">📢 Поділитися результатом</button>
        <button class="play-again-btn" onclick="continueGame()">🎲 Продовжити гру</button>
        <button class="menu-btn" onclick="showMenu()">← В меню</button>
      </div>
    </div>
  </div>
</div>

<script src="questions.js"></script>
<script src="app.js"></script>
<script>
// Apply i18n to static HTML
if (typeof i18n !== 'undefined') {
  document.querySelector('#menu h1').textContent = i18n.title;
  document.querySelector('#menu .subtitle').textContent = i18n.subtitle;
  document.querySelector('.truth-btn .game-name').textContent = isEn ? 'Truth' : 'Правда';
  document.querySelector('.dare-btn .game-name').textContent = isEn ? 'Dare' : 'Дія';
  document.querySelector('.never-btn .game-name').textContent = isEn ? 'Never Have I...' : 'Я ніколи не...';
  document.querySelector('.rather-btn .game-name').textContent = isEn ? 'Would You Rather?' : 'Що б ти обрав?';
  document.querySelector('.random-btn').textContent = i18n.random;
  document.querySelector('.share-btn').textContent = i18n.invite;
  document.querySelector('#next-btn').textContent = i18n.next;
  document.querySelector('.share-question-btn').textContent = i18n.share;
  document.querySelector('.react-btn.drink').textContent = i18n.iDid;
  document.querySelector('.react-btn.clean').textContent = i18n.notMe;
  // Summary screen
  document.querySelector('#summary .summary-card h2').textContent = i18n.sessionTitle;
  document.querySelector('.share-result-btn').textContent = i18n.shareResult;
  document.querySelector('.play-again-btn').textContent = i18n.continueGame;
  document.querySelector('.menu-btn').textContent = i18n.toMenu;
}
</script>
</body>
</html>
